<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rally Pack Studio</title>
<style>
:root{
  --surface-nav:#010409;--surface-page:#0d1117;--surface-card:#161b22;--surface-raised:#21262d;--surface-hover:#30363d;
  --border-subtle:#21262d;--border-default:#30363d;
  --text-bright:#fff;--text-primary:#e0e0e0;--text-secondary:#c9d1d9;--text-muted:#8b949e;--text-dim:#6e7681;
  --accent:#007eff;--accent-hover:#0066cc;--accent-light:#58a6ff;
  --danger:#8b0000;--danger-hover:#cc0000;--success:#006622;--warn:#7a4000;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Barlow,Arial,sans-serif;background:var(--surface-page);color:var(--text-primary);min-height:100vh}
header{background:var(--surface-nav);border-bottom:2px solid var(--accent);padding:10px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
header .brand{font-size:20px;letter-spacing:3px;color:var(--accent);font-weight:bold;text-transform:uppercase}
header .sub{font-size:12px;color:var(--text-muted)}
.layout{display:flex;max-width:1280px;margin:0 auto;align-items:flex-start}
#side-nav{position:sticky;top:52px;width:190px;flex-shrink:0;padding:16px 8px;display:flex;flex-direction:column;gap:2px;max-height:calc(100vh - 120px);overflow-y:auto}
#side-nav a{display:block;padding:5px 10px;border-radius:6px;color:var(--text-muted);text-decoration:none;font-size:12px;text-transform:uppercase;letter-spacing:1px}
#side-nav a:hover{background:var(--surface-raised);color:var(--accent-light)}
main{flex:1;min-width:0;padding:16px 16px 120px}
.card{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:8px;padding:16px;margin-bottom:18px}
.card h2{font-size:15px;text-transform:uppercase;letter-spacing:2px;color:var(--accent-light);margin-bottom:4px}
.card .hint{font-size:11px;color:var(--text-muted);margin-bottom:12px;line-height:1.5}
.fld{display:flex;flex-direction:column;gap:3px;margin:0 0 10px}
.fld>label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-weight:bold}
.fld .help{font-size:10px;color:var(--text-dim)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:0 14px}
.grid-wide{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0 14px}
input[type=text],input[type=number],select,textarea{background:var(--surface-page);border:1px solid var(--border-default);border-radius:5px;color:var(--text-primary);padding:6px 8px;font-size:13px;font-family:inherit;width:100%}
input[type=color]{background:var(--surface-page);border:1px solid var(--border-default);border-radius:5px;height:31px;width:100%;padding:2px}
textarea{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;min-height:64px;resize:vertical;line-height:1.45}
textarea.src{min-height:120px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
input.bad,textarea.bad{border-color:#cc3333;background:#1a0808}
.item{border:1px solid var(--border-default);border-radius:8px;padding:12px;margin-bottom:12px;background:rgba(255,255,255,.015)}
.item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px}
.item-head .item-title{font-size:12px;font-weight:bold;color:var(--text-secondary);letter-spacing:.5px}
.sub-item{border:1px dashed var(--border-default);border-radius:6px;padding:8px 10px;margin:8px 0}
.btn{display:inline-block;padding:6px 13px;border:none;border-radius:16px;cursor:pointer;font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;background:var(--surface-raised);color:var(--text-secondary)}
.btn:hover{background:var(--surface-hover)}
.btn-primary{background:var(--accent);color:var(--text-bright)}
.btn-primary:hover{background:var(--accent-hover)}
.btn-primary:disabled{background:#1e2a3a;color:#3a4a5a;cursor:not-allowed}
.btn-danger{background:transparent;color:#ef5350;border:1px solid #8b000088}
.btn-danger:hover{background:#2a0a0a}
.btn-add{background:transparent;border:1px dashed var(--border-default);color:var(--text-muted);width:100%;padding:8px;border-radius:8px}
.btn-add:hover{border-color:var(--accent);color:var(--accent-light)}
.pending{font-size:10px;padding:2px 8px;border-radius:10px;background:#2a2010;color:#d4a017;border:1px solid #d4a01744;vertical-align:middle;margin-left:6px;letter-spacing:.5px}
.check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);margin:0 0 10px}
.check input{width:auto}
footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface-nav);border-top:1px solid var(--border-default);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:60}
footer .status{font-size:11px;color:var(--text-muted);margin-right:auto}
footer .status.saved{color:#66bb6a}
#serve-warning{max-width:1280px;margin:14px auto 0;padding:10px 16px;border:1px solid #d4a01766;border-radius:8px;background:#1a1408;color:#e8c467;font-size:12px;display:none}
@media (max-width:760px){ #side-nav{display:none} }
</style>
</head>
<body>
<header>
  <span class="brand">Rally Pack Studio</span>
  <span class="sub">define a game, generate its pack and its app - nothing here ships in dist/</span>
</header>
<div id="serve-warning">Sources could not be fetched. Serve the repo root with <b>npm run studio</b> and open <b>http://localhost:3001/tools/studio/</b> (opening this file directly via file:// cannot work).</div>
<div class="layout">
  <nav id="side-nav"></nav>
  <main id="form-col"></main>
</div>
<footer>
  <span class="status" id="draft-status">no draft</span>
  <button class="btn" id="btn-example">Load Skirmish example</button>
  <button class="btn" id="btn-export">Export project</button>
  <button class="btn" id="btn-import">Import project</button>
  <input type="file" id="import-file" accept="application/json,.json" style="display:none">
  <button class="btn btn-primary" id="btn-generate" disabled title="Codegen lands in the next PR">Generate &amp; Preview</button>
  <button class="btn" id="btn-dl-pack" disabled title="Codegen lands in the next PR">Download pack .js</button>
  <button class="btn" id="btn-dl-html" disabled title="Codegen lands in the next PR">Download index.html</button>
</footer>
<script src="studio.js"></script>
</body>
</html>
